<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>sbs-worksheet（自社範囲）</title>
  <style>
    body{font-family:system-ui,-apple-system; padding:16px; max-width:640px; margin:0 auto;}
    .card{padding:14px; border:1px solid #ddd; border-radius:12px; margin:12px 0;}
    label{display:block; margin:10px 0 6px;}
    input{width:100%; font-size:18px; padding:10px; border-radius:10px; border:1px solid #ccc;}
    button{width:100%; font-size:18px; padding:12px; border-radius:12px; border:0; background:#f3f3f3;}
    button:active{transform:scale(0.99);}
    .out{font-size:34px; font-weight:900; margin-top:10px;}
    .sub{color:#666; font-size:14px; line-height:1.6; margin-top:6px;}
    .warn{color:#b45309;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width:520px){ .row{grid-template-columns:1fr;} }
    .divider{height:1px;background:#eee;margin:14px 0;}
  </style>
</head>
<body>
  <h1>sbs-worksheet（自社範囲）</h1>

  <div class="card">
    <div class="row">
      <div>
        <label>病院名</label>
        <input id="hospital_name" type="text" placeholder="例：○○病院" />
      </div>
      <div>
        <label>担当者</label>
        <input id="owner_name" type="text" placeholder="例：杉 健" />
      </div>
    </div>

    <label>合言葉（PIN）</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="例：1234" />

    <div class="divider"></div>

    <div class="row">
      <div>
        <label>ベッドサイド端末 台数</label>
        <input id="qty_bedside" type="number" inputmode="numeric" placeholder="例：20" />
      </div>
      <div>
        <label>眠りSCAN 台数</label>
        <input id="qty_sleep" type="number" inputmode="numeric" placeholder="例：20" />
      </div>

      <div>
        <label>Wi-Fiベッドナビ 台数</label>
        <input id="qty_wifi" type="number" inputmode="numeric" placeholder="例：20" />
      </div>
      <div>
        <label>ステーション端末 台数</label>
        <input id="qty_station" type="number" inputmode="numeric" placeholder="例：2" />
      </div>

      <div>
        <label>病床数</label>
        <input id="bed_count" type="number" inputmode="numeric" placeholder="例：180" />
      </div>
      <div>
        <label>病棟数</label>
        <input id="ward_count" type="number" inputmode="numeric" placeholder="例：4" />
      </div>
    </div>

    <button id="calc">計算</button>

    <div class="out" id="out">-</div>
    <div class="sub" id="breakdown"></div>
    <div class="sub warn" id="note"></div>
  </div>

<script>
  // ★あなたの Apps Script /exec URL
  const API_URL = "https://script.google.com/macros/s/AKfycbxIowoXb6IQJq2bJnJV09BnKHF2YOjeFBZXrPQGObNd-kHglm8kURbvOEVV6JGOIWqZ/exec";

  function yen(n){
    const x = Number(n || 0);
    return x.toLocaleString("ja-JP") + " 円";
  }
  function v(id){ return String(document.getElementById(id).value || "0"); }
  function s(id){ return String(document.getElementById(id).value || "").trim(); }

  // JSONP helper（CORS回避）
  function jsonp(url, callbackName, timeoutMs=20000){
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout"));
      }, timeoutMs);

      function cleanup(){
        clearTimeout(timer);
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
      }

      window[callbackName] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("JSONP script load error"));
      };

      script.src = url;
      document.body.appendChild(script);
    });
  }

  async function calc(){
    try{
      document.getElementById("out").textContent = "計算中…";
      document.getElementById("breakdown").textContent = "";
      document.getElementById("note").textContent = "";

      const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);

      const params = new URLSearchParams({
        callback: cb,
        pin: s("pin"),
        hospital_name: s("hospital_name"),
        owner_name: s("owner_name"),
        qty_bedside: v("qty_bedside"),
        qty_sleep: v("qty_sleep"),
        qty_wifi: v("qty_wifi"),
        qty_station: v("qty_station"),
        bed_count: v("bed_count"),
        ward_count: v("ward_count"),
        _: String(Date.now()) // キャッシュ回避
      });

      const url = API_URL + "?" + params.toString();
      const data = await jsonp(url, cb);

      if(!data.ok){
        document.getElementById("out").textContent = "エラー";
        document.getElementById("breakdown").textContent = data.error || "失敗しました";
        document.getElementById("note").textContent = "";
        return;
      }

      document.getElementById("out").textContent = data.total_yen || yen(data.total);
      document.getElementById("breakdown").textContent =
        "機器: " + yen(data.hw_total) + " / サーバ: " + yen(data.server_cost) + " / 構築: " + yen(data.build_cost);

      document.getElementById("note").textContent =
        data.scope_note || "※ 他システム連携（HIS/NC等）は範囲外：別途見積";
    }catch(e){
      document.getElementById("out").textContent = "通信エラー";
      document.getElementById("breakdown").textContent = String(e);
      document.getElementById("note").textContent = "";
    }
  }

  document.getElementById("calc").addEventListener("click", calc);
</script>
</body>
</html>
