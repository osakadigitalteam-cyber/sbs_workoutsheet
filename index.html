<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>sbs-worksheet</title>

<style>
body{font-family:sans-serif;background:#f5f6f8;margin:0;padding:20px}
.wrap{max-width:900px;margin:auto}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;border:1px solid #ddd}
button{width:100%;padding:14px;font-size:16px;background:#111;color:#fff;border:0;border-radius:10px}
.detail-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #ddd}
.sub-line{font-size:12px;color:#777}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<label>ベッドサイド端末</label>
<input id="qty_bedside" type="number">

<label>サーバー</label>
<select id="server_type">
<option value="">選択</option>
<option value="pc_builtin">PC内部</option>
<option value="tower">タワー</option>
<option value="rack">ラック</option>
</select>

<button id="calc">計算</button>
<div id="status"></div>
</div>

<div class="card">
<div id="result"></div>
<div id="breakdown"></div>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbytWUFZxEH1984ckdNRYaS-2eLuIfJyR9vJTDtvnMq5tzH5RIH7jiNtDz5gAUArXb0E/exec";

function toNum(v){return Number(v)||0;}
function yen(n){return Number(n).toLocaleString()+" 円";}

function setStatus(t){
document.getElementById("status").textContent=t;
}

/* =========================
  ★ サーバー制限ロジック
========================= */
function applyServerRestriction(){

const bedside=toNum(document.getElementById("qty_bedside").value);
const select=document.getElementById("server_type");

const pc=select.querySelector('[value="pc_builtin"]');
const tower=select.querySelector('[value="tower"]');
const rack=select.querySelector('[value="rack"]');

if(bedside>0){

pc.disabled=true;
tower.disabled=true;
rack.disabled=false;

if(select.value!=="rack"){
select.value="rack";
setStatus("ベッドサイド端末あり → ラックマウントのみ選択可能");
}

}else{

pc.disabled=false;
tower.disabled=false;
rack.disabled=false;

}

}

/* =========================
  JSONP
========================= */
function jsonp(url,cb){
return new Promise((res,rej)=>{
window[cb]=(data)=>{delete window[cb];res(data);}
const s=document.createElement("script");
s.src=url;
document.body.appendChild(s);
});
}

/* =========================
  表示
========================= */
function render(data){

document.getElementById("result").innerHTML=
"総額："+yen(data.total)+"<br>機器合計："+yen(data.hw_total);

const rows=data.hardware_breakdown||[];

let html="";
let total=0;

rows.forEach(r=>{
total+=toNum(r.amount);

html+=`
<div class="detail-line">
<div>
${r.label}<br>
<span class="sub-line">数量:${r.qty} / 単価:${yen(r.unit_price)}</span>
</div>
<div>${yen(r.amount)}</div>
</div>`;
});

html+=`
<div class="detail-line">
<div><b>機器合計</b></div>
<div><b>${yen(total)}</b></div>
</div>`;

document.getElementById("breakdown").innerHTML=html;

}

/* =========================
  計算
========================= */
async function calc(){

const bedside=toNum(document.getElementById("qty_bedside").value);
const server=document.getElementById("server_type").value;

if(bedside>0 && server!=="rack"){
setStatus("ラックサーバーを選択してください");
return;
}

const cb="cb"+Date.now();

const url=API_URL+"?callback="+cb
+"&pin=1234"
+"&qty_bedside="+bedside
+"&server_type="+server;

const data=await jsonp(url,cb);

if(!data.ok){
setStatus(data.error);
return;
}

render(data);
setStatus("OK");

}

/* =========================
  イベント
========================= */
document.getElementById("qty_bedside").addEventListener("input",applyServerRestriction);
document.getElementById("server_type").addEventListener("change",applyServerRestriction);
document.getElementById("calc").addEventListener("click",calc);

/* 初期実行 */
applyServerRestriction();

</script>
</body>
</html>
