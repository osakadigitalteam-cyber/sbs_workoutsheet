<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>sbs-worksheet（自社範囲）</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
      background: #fafafa;
      color: #222;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.3;
    }

    .card {
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      margin: 12px 0;
      background: #fff;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 10px;
      color: #444;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #888;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    button {
      width: 100%;
      font-size: 19px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      border: 0;
      background: #f3f3f3;
      margin-top: 24px;
      cursor: pointer;
    }

    button:hover {
      background: #e9e9e9;
    }

    button:active {
      transform: scale(0.99);
    }

    .out {
      font-size: 34px;
      font-weight: 900;
      margin-top: 16px;
      line-height: 1.3;
      word-break: break-word;
    }

    .sub {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-top: 8px;
      white-space: pre-line;
    }

    .warn {
      color: #b45309;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0,1fr);
      gap: 14px;
    }

    .row > div {
      min-width: 0;
    }

    .result-box {
      margin-top: 18px;
      padding-top: 6px;
    }

    @media (max-width: 520px) {
      .row {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      h1 {
        font-size: 24px;
      }

      .out {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <h1>sbs-worksheet（自社範囲）</h1>

  <div class="card">
    <div class="section-title">認証</div>
    <label for="pin">PIN</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="例：1234" />

    <div class="divider"></div>

    <div class="section-title">基本情報</div>
    <div class="row">
      <div>
        <label for="hospital_name">病院名</label>
        <input id="hospital_name" type="text" placeholder="例：○○病院" />
      </div>
      <div>
        <label for="owner_name">担当者</label>
        <input id="owner_name" type="text" placeholder="例：大阪 デジタル" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">導入条件</div>
    <div class="row">
      <div>
        <label for="server_type">サーバー機種</label>
        <select id="server_type">
          <option value="">選択してください</option>
          <option value="pc_builtin">PC内部サーバー（～100床）</option>
          <option value="tower">タワー型サーバー（～300床）</option>
          <option value="rack">ラックマウント型サーバー</option>
        </select>
      </div>

      <div>
        <label for="bed_count">（導入予定の）病床数</label>
        <input id="bed_count" type="number" inputmode="numeric" placeholder="例：180" />
      </div>

      <div>
        <label for="ward_count">（導入予定の）病棟数</label>
        <input id="ward_count" type="number" inputmode="numeric" placeholder="例：4" />
      </div>

      <div>
        <label for="qty_station">ステーション端末 台数</label>
        <input id="qty_station" type="number" inputmode="numeric" value="0" placeholder="例：2" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">機器台数</div>
    <div class="row">
      <div>
        <label for="qty_bedside">ベッドサイド端末 台数</label>
        <input id="qty_bedside" type="number" inputmode="numeric" value="0" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_sleep">眠りSCAN 台数</label>
        <input id="qty_sleep" type="number" inputmode="numeric" value="0" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_wifi">Wi-Fiベッドナビ 台数</label>
        <input id="qty_wifi" type="number" inputmode="numeric" value="0" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_camera">ネットワークカメラ 台数</label>
        <input id="qty_camera" type="number" inputmode="numeric" value="0" placeholder="例：4" />
      </div>

      <div>
        <label for="qty_mobile">モバイル端末 台数</label>
        <input id="qty_mobile" type="number" inputmode="numeric" value="0" placeholder="例：10" />
      </div>
    </div>

    <div class="divider"></div>

    <button id="calc">計算</button>

    <div class="result-box">
      <div class="out" id="out">-</div>
      <div class="sub" id="breakdown"></div>
      <div class="sub warn" id="note"></div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx7HgcoxPsOQWHe6JcY-jli4SDVofN8Myye068sH9LaxYIJPP-EoXxT4voKPFVCdHQI/exec";

  function yen(n) {
    const x = Number(n || 0);
    return x.toLocaleString("ja-JP") + " 円";
  }

  function v(id) {
    return String(document.getElementById(id).value || "0");
  }

  function s(id) {
    return String(document.getElementById(id).value || "").trim();
  }

  function jsonp(url, callbackName, timeoutMs = 20000) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout"));
      }, timeoutMs);

      function cleanup() {
        clearTimeout(timer);
        if (script.parentNode) script.parentNode.removeChild(script);
        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = undefined;
        }
      }

      window[callbackName] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("JSONP script load error"));
      };

      script.src = url;
      document.body.appendChild(script);
    });
  }

  async function calc() {
    try {
      document.getElementById("out").textContent = "計算中…";
      document.getElementById("breakdown").textContent = "";
      document.getElementById("note").textContent = "";

      const st = s("server_type");
      if (!st) {
        document.getElementById("out").textContent = "エラー";
        document.getElementById("breakdown").textContent = "サーバー機種を選択してください";
        return;
      }

      const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

      const params = new URLSearchParams({
        callback: cb,
        pin: s("pin"),
        hospital_name: s("hospital_name"),
        owner_name: s("owner_name"),
        server_type: st,

        qty_bedside: v("qty_bedside"),
        qty_sleep: v("qty_sleep"),
        qty_wifi: v("qty_wifi"),
        qty_station: v("qty_station"),
        qty_camera: v("qty_camera"),
        qty_mobile: v("qty_mobile"),

        bed_count: v("bed_count"),
        ward_count: v("ward_count"),

        _: String(Date.now())
      });

      const url = API_URL + "?" + params.toString();
      const data = await jsonp(url, cb);

      if (!data.ok) {
        document.getElementById("out").textContent = "エラー";
        document.getElementById("breakdown").textContent = data.error || "失敗しました";
        document.getElementById("note").textContent = "";
        return;
      }

      document.getElementById("out").textContent = data.total_yen || yen(data.total);

      const perBed = data.price_per_bed_yen || yen(data.price_per_bed);
      const serverLabel = data.server_type_label ? `（${data.server_type_label}）` : "";

      document.getElementById("breakdown").textContent =
        "機器: " + yen(data.hw_total) +
        " / サーバ: " + yen(data.server_cost) +
        " / 構築: " + yen(data.build_cost) +
        " / 1床あたり: " + perBed +
        serverLabel;

      const desc = data.server_description || "";
      const note = data.note_text || "";
      document.getElementById("note").textContent = (desc ? desc + "\n\n" : "") + note;

    } catch (e) {
      document.getElementById("out").textContent = "通信エラー";
      document.getElementById("breakdown").textContent = String(e);
      document.getElementById("note").textContent = "";
    }
  }

  document.getElementById("calc").addEventListener("click", calc);
</script>
</body>
</html>
