<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>sbs-worksheet（自社範囲）</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 760px;
      margin: 0 auto;
      background: #fafafa;
      color: #222;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.3;
    }

    .card {
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 14px;
      margin: 12px 0;
      background: #fff;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 10px;
      color: #444;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #888;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .helper-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .helper-btn {
      width: auto;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f8f8f8;
      cursor: pointer;
    }

    .helper-btn:hover {
      background: #efefef;
    }

    .button-wrap {
      margin-top: 32px;
    }

    button {
      width: 100%;
      font-size: 19px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      border: 0;
      background: #f3f3f3;
      cursor: pointer;
      display: block;
    }

    button:hover {
      background: #e9e9e9;
    }

    button:active,
    .helper-btn:active {
      transform: scale(0.99);
    }

    .out {
      font-size: 34px;
      font-weight: 900;
      margin-top: 16px;
      line-height: 1.3;
      word-break: break-word;
    }

    .sub {
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-top: 8px;
      white-space: pre-line;
    }

    .warn {
      color: #b45309;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0,1fr);
      gap: 14px;
    }

    .row > div {
      min-width: 0;
    }

    .result-box {
      margin-top: 18px;
      padding-top: 6px;
    }

    .detail-box {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fcfcfc;
    }

    .detail-title {
      font-size: 14px;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    .detail-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 0;
      border-bottom: 1px dashed #eee;
      font-size: 14px;
      line-height: 1.5;
    }

    .detail-line:last-child {
      border-bottom: 0;
    }

    .detail-name {
      color: #333;
      white-space: pre-wrap;
    }

    .detail-value {
      color: #111;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .row {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      h1 {
        font-size: 24px;
      }

      .out {
        font-size: 30px;
      }

      .button-wrap {
        margin-top: 28px;
      }

      .detail-line {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .detail-value {
        text-align: left;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <h1>sbs-worksheet（自社範囲）</h1>

  <div class="card">
    <div class="section-title">認証</div>
    <label for="pin">PIN</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="例：1234" />

    <div class="divider"></div>

    <div class="section-title">基本情報</div>
    <div class="row">
      <div>
        <label for="hospital_name">病院名</label>
        <input id="hospital_name" type="text" placeholder="例：○○病院" />
      </div>
      <div>
        <label for="owner_name">担当者</label>
        <input id="owner_name" type="text" placeholder="例：大阪 デジタル" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">導入条件</div>
    <div class="row">
      <div>
        <label for="server_type">サーバー機種</label>
        <select id="server_type">
          <option value="">選択してください</option>
          <option value="pc_builtin">PC内部サーバー（～100床）</option>
          <option value="tower">タワー型サーバー（～300床）</option>
          <option value="rack">ラックマウント型サーバー</option>
        </select>
      </div>

      <div>
        <label for="bed_count">総病床数</label>
        <input id="bed_count" type="number" inputmode="numeric" placeholder="例：180" />
      </div>

      <div>
        <label for="ward_count">（導入予定の）病棟数</label>
        <input id="ward_count" type="number" inputmode="numeric" placeholder="例：4" />
      </div>

      <div>
        <label for="qty_station">ステーション端末 台数</label>
        <input id="qty_station" type="number" inputmode="numeric" placeholder="例：2" />
      </div>
    </div>

    <div class="helper-row">
      <button type="button" class="helper-btn" id="fill-standard">病床数を端末台数に反映</button>
      <button type="button" class="helper-btn" id="clear-qty">数量欄をクリア</button>
    </div>

    <div class="divider"></div>

    <div class="section-title">機器台数</div>
    <div class="row">
      <div>
        <label for="qty_bedside">ベッドサイド端末 台数</label>
        <input id="qty_bedside" type="number" inputmode="numeric" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_sleep">眠りSCAN 台数</label>
        <input id="qty_sleep" type="number" inputmode="numeric" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_wifi">Wi-Fiベッドナビ 台数</label>
        <input id="qty_wifi" type="number" inputmode="numeric" placeholder="例：20" />
      </div>

      <div>
        <label for="qty_camera">ネットワークカメラ 台数</label>
        <input id="qty_camera" type="number" inputmode="numeric" placeholder="例：4" />
      </div>

      <div>
        <label for="qty_mobile">モバイル端末 台数</label>
        <input id="qty_mobile" type="number" inputmode="numeric" placeholder="例：10" />
      </div>
    </div>

    <div class="button-wrap">
      <button id="calc">計算</button>
    </div>

    <div class="result-box">
      <div class="out" id="out">-</div>
      <div class="sub" id="breakdown"></div>

      <div class="detail-box" id="detail-box" style="display:none;">
        <div class="detail-title">機器内訳</div>
        <div id="detail-lines"></div>
      </div>

      <div class="sub warn" id="note"></div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby8UMmGlMCm1rPLZV7SXs4z1oW4RVsH7GQPpmIGWU4ec1CGA5iFmpRyVueIGXvEvb2W/exec";

  const LABELS = {
    qty_bedside: "ベッドサイド端末",
    qty_sleep: "眠りSCAN",
    qty_wifi: "Wi-Fiベッドナビ",
    qty_camera: "ネットワークカメラ",
    qty_mobile: "モバイル端末",
    qty_station: "ステーション端末"
  };

  function yen(n) {
    const x = Number(n || 0);
    return x.toLocaleString("ja-JP") + " 円";
  }

  function toNum(v) {
    const x = Number(v);
    return Number.isFinite(x) ? x : 0;
  }

  function v(id) {
    return String(document.getElementById(id).value || "0");
  }

  function s(id) {
    return String(document.getElementById(id).value || "").trim();
  }

  function getQty(id) {
    return toNum(document.getElementById(id).value || 0);
  }

  function jsonp(url, callbackName, timeoutMs = 20000) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout"));
      }, timeoutMs);

      function cleanup() {
        clearTimeout(timer);
        if (script.parentNode) script.parentNode.removeChild(script);
        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = undefined;
        }
      }

      window[callbackName] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("JSONP script load error"));
      };

      script.src = url;
      document.body.appendChild(script);
    });
  }

  function renderDetails(prices) {
    const box = document.getElementById("detail-box");
    const container = document.getElementById("detail-lines");

    if (!prices) {
      box.style.display = "none";
      container.innerHTML = "";
      return;
    }

    const priceMap = {
      qty_bedside: prices.bedside_terminal || 0,
      qty_sleep: prices.sleep_scan || 0,
      qty_wifi: prices.wifi_bed_navi || 0,
      qty_camera: prices.network_camera || 0,
      qty_mobile: prices.mobile_terminal || 0,
      qty_station: prices.station_terminal || 0
    };

    const ids = ["qty_bedside", "qty_sleep", "qty_wifi", "qty_camera", "qty_mobile", "qty_station"];
    const lines = [];

    for (const id of ids) {
      const qty = getQty(id);
      if (qty <= 0) continue;

      const amount = qty * (priceMap[id] || 0);
      lines.push({
        name: `${LABELS[id]}　${qty}台`,
        amount
      });
    }

    if (lines.length === 0) {
      box.style.display = "none";
      container.innerHTML = "";
      return;
    }

    const total = lines.reduce((sum, item) => sum + item.amount, 0);

    let html = "";
    for (const item of lines) {
      html += `
        <div class="detail-line">
          <div class="detail-name">${item.name}</div>
          <div class="detail-value">${yen(item.amount)}</div>
        </div>
      `;
    }

    html += `
      <div class="detail-line">
        <div class="detail-name"><strong>機器合計</strong></div>
        <div class="detail-value"><strong>${yen(total)}</strong></div>
      </div>
    `;

    container.innerHTML = html;
    box.style.display = "block";
  }

  function fillStandardByBeds() {
    const beds = toNum(document.getElementById("bed_count").value || 0);
    if (beds <= 0) return;

    document.getElementById("qty_bedside").value = beds;
    document.getElementById("qty_sleep").value = beds;
    document.getElementById("qty_wifi").value = beds;
  }

  function clearQuantities() {
    const ids = ["qty_station", "qty_bedside", "qty_sleep", "qty_wifi", "qty_camera", "qty_mobile"];
    for (const id of ids) {
      document.getElementById(id).value = "";
    }
    document.getElementById("detail-box").style.display = "none";
    document.getElementById("detail-lines").innerHTML = "";
  }

  async function calc() {
    try {
      document.getElementById("out").textContent = "計算中…";
      document.getElementById("breakdown").textContent = "";
      document.getElementById("note").textContent = "";

      const st = s("server_type");
      if (!st) {
        document.getElementById("out").textContent = "エラー";
        document.getElementById("breakdown").textContent = "サーバー機種を選択してください";
        document.getElementById("detail-box").style.display = "none";
        return;
      }

      const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

      const params = new URLSearchParams({
        callback: cb,
        pin: s("pin"),
        hospital_name: s("hospital_name"),
        owner_name: s("owner_name"),
        server_type: st,

        qty_bedside: v("qty_bedside"),
        qty_sleep: v("qty_sleep"),
        qty_wifi: v("qty_wifi"),
        qty_station: v("qty_station"),
        qty_camera: v("qty_camera"),
        qty_mobile: v("qty_mobile"),

        bed_count: v("bed_count"),
        ward_count: v("ward_count"),

        _: String(Date.now())
      });

      const url = API_URL + "?" + params.toString();
      const data = await jsonp(url, cb);

      if (!data.ok) {
        document.getElementById("out").textContent = "エラー";
        document.getElementById("breakdown").textContent = data.error || "失敗しました";
        document.getElementById("note").textContent = "";
        document.getElementById("detail-box").style.display = "none";
        return;
      }

      document.getElementById("out").textContent = data.total_yen || yen(data.total);

      const perBed = data.price_per_bed_yen || yen(data.price_per_bed);
      const serverLabel = data.server_type_label ? `（${data.server_type_label}）` : "";

      document.getElementById("breakdown").textContent =
        "機器: " + yen(data.hw_total) +
        " / サーバ: " + yen(data.server_cost) +
        " / 構築: " + yen(data.build_cost) +
        " / 1床あたり: " + perBed +
        serverLabel;

      const desc = data.server_description || "";
      const note = data.note_text || "";
      document.getElementById("note").textContent = (desc ? desc + "\n\n" : "") + note;

      renderDetails(data.unit_prices);

    } catch (e) {
      document.getElementById("out").textContent = "通信エラー";
      document.getElementById("breakdown").textContent = String(e);
      document.getElementById("note").textContent = "";
      document.getElementById("detail-box").style.display = "none";
    }
  }

  document.getElementById("calc").addEventListener("click", calc);
  document.getElementById("fill-standard").addEventListener("click", fillStandardByBeds);
  document.getElementById("clear-qty").addEventListener("click", clearQuantities);
</script>
</body>
</html>
