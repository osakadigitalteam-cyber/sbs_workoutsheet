<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>sbs-worksheet</title>
  <style>
    body{font-family:system-ui,-apple-system; padding:16px; max-width:560px; margin:0 auto;}
    .card{padding:14px; border:1px solid #ddd; border-radius:12px; margin:12px 0;}
    label{display:block; margin:10px 0 6px;}
    input{width:100%; font-size:18px; padding:10px; border-radius:10px; border:1px solid #ccc;}
    button{width:100%; font-size:18px; padding:12px; border-radius:12px; border:0;}
    .out{font-size:28px; font-weight:700; margin-top:8px;}
    .sub{color:#666; font-size:14px; line-height:1.5;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width:520px){ .row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <h1>sbs-worksheet（自社範囲）</h1>

  <div class="card">
    <label>合言葉（PIN）</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="例: 1234">

    <div class="row">
      <div>
        <label>ベッドサイド端末 台数</label>
        <input id="qty_bedside" type="number" inputmode="numeric" placeholder="例: 20">
      </div>
      <div>
        <label>眠りSCAN 台数</label>
        <input id="qty_sleep" type="number" inputmode="numeric" placeholder="例: 20">
      </div>
      <div>
        <label>Wi-Fiベッドナビ 台数</label>
        <input id="qty_wifi" type="number" inputmode="numeric" placeholder="例: 20">
      </div>
      <div>
        <label>ステーション端末 台数</label>
        <input id="qty_station" type="number" inputmode="numeric" placeholder="例: 2">
      </div>
      <div>
        <label>病床数</label>
        <input id="bed_count" type="number" inputmode="numeric" placeholder="例: 180">
      </div>
      <div>
        <label>病棟数</label>
        <input id="ward_count" type="number" inputmode="numeric" placeholder="例: 4">
      </div>
    </div>

    <button id="calc">計算</button>

    <div class="out" id="out">-</div>
    <div class="sub" id="breakdown"></div>
    <div class="sub" id="note"></div>
  </div>

  <script>
    // ★ここだけ差し替え
    const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrTv3e-DhDOezt4_7hfpg-BpS67prD2x71Lo4KmnxVuBo_89v-Z4TVig4dLBVcw4T88hH_ojpeilttwni1i-uoNdtsLPNL1Hnicd8_UaRDcD6DMdlapHVb1st34FyPUUx6BN1PILXy_bmNpzKe3khlHjMjbt4D0W4N0pFz4UUI5E9AjUj06zdK0uiOCLkIVd5AtySaS88CpmPbPxXxUHIlOsvxsf5xpY4MlJmnDQyzg6Jfy8lTp4U1IDiwooKxztZzXjm0SCxZh-SXfIbVxonTrgGFirNw&lib=Mq6T6EnDVUcY3S36_hJNINnhkBvK4QXUi";

    function yen(n){
      var x = Number(n || 0);
      return x.toLocaleString("ja-JP") + " 円";
    }

    async function calc(){
      try{
        var payload = {
          pin: document.getElementById("pin").value,
          qty_bedside: document.getElementById("qty_bedside").value,
          qty_sleep: document.getElementById("qty_sleep").value,
          qty_wifi: document.getElementById("qty_wifi").value,
          qty_station: document.getElementById("qty_station").value,
          bed_count: document.getElementById("bed_count").value,
          ward_count: document.getElementById("ward_count").value
        };

        var res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        var data = await res.json();

        if(!data.ok){
          document.getElementById("out").textContent = "エラー";
          document.getElementById("breakdown").textContent = data.error || "失敗しました";
          document.getElementById("note").textContent = "";
          return;
        }

        document.getElementById("out").textContent = data.total_yen || yen(data.total);
        document.getElementById("breakdown").textContent =
          "機器: " + yen(data.hw_total) + " / サーバ: " + yen(data.server_cost) + " / 構築: " + yen(data.build_cost);
        document.getElementById("note").textContent =
          data.scope_note || "※ 他システム連携（HIS/NC等）は範囲外：別途見積";
      }catch(e){
        document.getElementById("out").textContent = "通信エラー";
        document.getElementById("breakdown").textContent = String(e);
      }
    }

    document.getElementById("calc").addEventListener("click", calc);
  </script>
</body>
</html>
